name: 插件提交
description: 向 NyxBot 插件市场提交一个新插件
labels: ["plugin-submission"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提交插件！请认真填写以下信息。
        - **版本号和下载地址无需填写**，工作流会自动从你仓库的最新 Release 获取
        - **fileSize / sha256** 也由工作流自动计算
        - 你的仓库需要先发布一个 GitHub Release（含 `.jar` 资产）
        - 提交后工作流自动校验，校验通过会创建 PR 等待审核

  - type: input
    id: name
    attributes:
      label: 插件唯一标识名
      description: 全小写英文，用 `-` 分隔，如 `draw-alerts`。对应索引 key。
      placeholder: draw-alerts
    validations:
      required: true

  - type: input
    id: displayName
    attributes:
      label: 展示名称
      description: 中文或英文展示名
      placeholder: 警报绘图插件
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 插件描述
      description: 一句话说明插件功能
      placeholder: 渲染 Warframe 警报信息为图片
    validations:
      required: true

  - type: input
    id: author
    attributes:
      label: 作者 GitHub 用户名
      placeholder: KingPrimes
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: 插件类型
      description: |
        jar=纯 Java 插件
        native=含 JNA 原生库插件，仍以 .jar 形式发布——将各平台原生库内嵌 jar（JNA classpath 模式），详见仓库 README
      options:
        - jar
        - native
    validations:
      required: true

  - type: input
    id: repository
    attributes:
      label: 源代码仓库
      description: 格式 owner/repo，必须公开可访问，且已发布至少一个 Release
      placeholder: KingPrimes/nyxbot-draw-plugin
    validations:
      required: true

  - type: input
    id: license
    attributes:
      label: 许可证
      description: SPDX 标识符，如 MIT、GPL-3.0、Apache-2.0
      placeholder: MIT
    validations:
      required: true

  - type: input
    id: homepage
    attributes:
      label: 项目主页 URL
      description: 可选，留空填 `-`
      placeholder: https://github.com/KingPrimes/nyxbot-draw-plugin
    validations:
      required: false

  - type: input
    id: iconUrl
    attributes:
      label: 图标 URL
      description: 可选，留空填 `-`
      placeholder: https://raw.githubusercontent.com/.../icon.png
    validations:
      required: false

  - type: input
    id: tags
    attributes:
      label: 标签
      description: 逗号分隔，如 draw,native,jna
      placeholder: draw
    validations:
      required: false

  - type: input
    id: jarAssetName
    attributes:
      label: jar 资产名
      description: 可选。仅当 Release 含多个 .jar 文件时需要指定；单个 jar 留空即可
      placeholder: draw-alerts-1.0.0.jar
    validations:
      required: false

  - type: input
    id: requires
    attributes:
      label: 最低 Java 版本要求
      description: 如 >=21
      placeholder: ">=21"
    validations:
      required: true
