name: 插件更新校验

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  validate-and-pr:
    # 三重校验：必须是 plugin-update 标签 + opened + issue body 含模板特征字段
    if: contains(github.event.issue.labels.*.name, 'plugin-update')
        && contains(github.event.issue.body, '### 插件标识名')
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 运行更新校验脚本
        id: validate
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/update-plugin.mjs

      - name: 创建 PR
        if: success()
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ steps.validate.outputs.branch }}
          commit-message: |
            feat(plugins): ⬆️ 更新插件 ${{ steps.validate.outputs.plugin_name }} v${{ steps.validate.outputs.plugin_version }}

            来源 issue: #${{ github.event.issue.number }}
          title: |
            [插件] 更新 ${{ steps.validate.outputs.plugin_name }} v${{ steps.validate.outputs.plugin_version }}
          body: |
            校验报告见 Workflow Summary。

            关联 issue: #${{ github.event.issue.number }}

            请审核后合并。合并后会自动关闭关联 issue。
          labels: |
            plugin-update
            auto-generated
          assignees: ${{ github.event.issue.user.login }}

      - name: 校验失败 - 评论并加标签
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            await github.rest.issues.createComment({
              owner, repo, issue_number: issueNumber,
              body: [
                '❌ **插件更新校验失败**',
                '',
                '请查看 [Workflow 运行日志](' +
                  `https://github.com/${owner}/${repo}/actions/runs/${context.runId}` +
                ') 中的 `运行更新校验脚本` 步骤，根据报错修正后重新提交 issue。',
                '',
                '常见原因：',
                '- 插件标识名不存在于索引中（如需新增请用「插件提交」模板）',
                '- 作者仓库没有任何 Release，或 Release 不含 .jar 资产',
                '- Release 含多个 .jar 资产但未指定「jar 资产名」',
                '- 新版本号已存在于索引中（该版本已收录）',
              ].join('\n')
            });
            await github.rest.issues.addLabels({
              owner, repo, issue_number: issueNumber,
              labels: ['invalid']
            });

      - name: 校验通过 - 评论 PR 链接
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = '${{ steps.validate.outputs.branch }}';
            await github.rest.issues.createComment({
              owner, repo, issue_number: issueNumber,
              body: [
                '✅ **插件更新校验通过**',
                '',
                '已自动创建 PR，等待仓库 owner 审核合并：',
                `https://github.com/${owner}/${repo}/pulls?q=head:${branch}`,
                '',
                '合并后本 issue 将自动关闭。',
              ].join('\n')
            });
